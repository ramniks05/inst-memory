<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title th:text="|${pageTitle} — DoLR|">Sign In</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="login-page-body">
<div class="login-page">
	<div class="login-page__backdrop" aria-hidden="true"></div>

	<header class="login-page__top">
		<a class="login-page__home" th:href="@{/}">
			<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
			Back to home
		</a>
	</header>

	<main class="login-page__main">
		<div class="login-card">
			<div class="login-card__brand">
				<img th:src="@{/images/emblem.svg}" alt="" class="login-card__emblem" onerror="this.style.display='none'"/>
				<p class="login-card__dept-hi">भूमि संसाधन विभाग</p>
				<h1 class="login-card__title">Sign in</h1>
				<p class="login-card__subtitle">Institutional Memory Portal</p>
			</div>

			<div class="login-card__alert" th:if="${loginError != null}" role="alert">
				<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
				<span th:text="${loginError}">Error</span>
			</div>

			<form class="login-card__form" method="post" th:action="@{/login}">
				<label class="login-card__field">
					<span class="login-card__label">Email address</span>
					<input type="email" id="login-email" name="email" class="login-card__input"
					       placeholder="you@dolr.gov.in" autocomplete="username" required autofocus/>
				</label>
				<label class="login-card__field">
					<span class="login-card__label">Password</span>
					<div class="login-card__pwd-wrap">
						<input type="password" id="login-password" name="password" class="login-card__input"
						       placeholder="Enter your password" autocomplete="current-password" required/>
						<button type="button" class="login-card__pwd-toggle" id="login-pwd-toggle"
						        aria-label="Show password">
							<svg id="login-eye-show" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
							<svg id="login-eye-hide" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
						</button>
					</div>
				</label>
				<button type="submit" class="login-card__submit">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
					Login to portal
				</button>
			</form>
			<script>
				(function () {
					var inp = document.getElementById('login-password');
					var btn = document.getElementById('login-pwd-toggle');
					var eyeShow = document.getElementById('login-eye-show');
					var eyeHide = document.getElementById('login-eye-hide');
					btn.addEventListener('click', function () {
						var isHidden = inp.type === 'password';
						inp.type = isHidden ? 'text' : 'password';
						eyeShow.style.display = isHidden ? 'none' : '';
						eyeHide.style.display = isHidden ? '' : 'none';
						btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
					});
				})();
			</script>
		</div>
	</main>
</div>
</body>
</html>
