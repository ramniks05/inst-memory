<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}" lang="en">
<body>
<section layout:fragment="content">
	<div class="chpw-page">
		<div class="page-header">
			<div class="page-header-left">
				<h1 class="page-title">Change Password</h1>
			</div>
		</div>

		<div class="chpw-card">

			<div class="chpw-card__icon" aria-hidden="true">
				<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
					<rect x="3" y="11" width="18" height="11" rx="2"/>
					<path d="M7 11V7a5 5 0 0 1 10 0v4"/>
				</svg>
			</div>

			<h2 class="chpw-card__title">Update your password</h2>
			<p class="chpw-card__sub">Use a strong password of at least 8 characters.</p>

			<div class="chpw-alert chpw-alert--error" th:if="${changePasswordError}" role="alert">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
				<span th:text="${changePasswordError}">Error</span>
			</div>

			<div class="chpw-alert chpw-alert--success" th:if="${changePasswordSuccess}" role="status">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
				<span th:text="${changePasswordSuccess}">Success</span>
			</div>

			<form class="chpw-form" method="post" th:action="@{/home/change-password}" autocomplete="off">

				<label class="chpw-field">
					<span class="chpw-label">Current password</span>
					<div class="chpw-input-wrap">
						<svg class="chpw-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
						<input type="password" name="currentPassword" id="currentPassword"
						       class="chpw-input" placeholder="Enter current password"
						       autocomplete="current-password" required/>
						<button type="button" class="chpw-toggle" aria-label="Toggle visibility" onclick="togglePwd('currentPassword', this)">
							<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
						</button>
					</div>
				</label>

				<label class="chpw-field">
					<span class="chpw-label">New password</span>
					<div class="chpw-input-wrap">
						<svg class="chpw-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
						<input type="password" name="newPassword" id="newPassword"
						       class="chpw-input" placeholder="At least 8 characters"
						       autocomplete="new-password" required minlength="8"/>
						<button type="button" class="chpw-toggle" aria-label="Toggle visibility" onclick="togglePwd('newPassword', this)">
							<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
						</button>
					</div>
				</label>

				<label class="chpw-field">
					<span class="chpw-label">Confirm new password</span>
					<div class="chpw-input-wrap">
						<svg class="chpw-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
						<input type="password" name="confirmPassword" id="confirmPassword"
						       class="chpw-input" placeholder="Repeat new password"
						       autocomplete="new-password" required minlength="8"/>
						<button type="button" class="chpw-toggle" aria-label="Toggle visibility" onclick="togglePwd('confirmPassword', this)">
							<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
						</button>
					</div>
					<span class="chpw-match-hint" id="matchHint" aria-live="polite"></span>
				</label>

				<button type="submit" class="chpw-submit">
					<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
					Update password
				</button>

			</form>
		</div>
	</div>

	<script>
		function togglePwd(id, btn) {
			var inp = document.getElementById(id);
			var isText = inp.type === 'text';
			inp.type = isText ? 'password' : 'text';
			btn.innerHTML = isText
				? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
				: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
		}
		(function () {
			var np = document.getElementById('newPassword');
			var cp = document.getElementById('confirmPassword');
			var hint = document.getElementById('matchHint');
			function check() {
				if (!cp.value) { hint.textContent = ''; hint.className = 'chpw-match-hint'; return; }
				if (np.value === cp.value) {
					hint.textContent = 'Passwords match';
					hint.className = 'chpw-match-hint chpw-match-hint--ok';
				} else {
					hint.textContent = 'Passwords do not match';
					hint.className = 'chpw-match-hint chpw-match-hint--err';
				}
			}
			np.addEventListener('input', check);
			cp.addEventListener('input', check);
		})();
	</script>
</section>
</body>
</html>
