<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}" lang="en">
<body>
<section layout:fragment="content">
	<div class="dashboard-container">
		<div class="page-header">
			<div class="page-header-left page-header-left--welcome">
				<h1 class="page-title" th:text="${pageTitle}">Home</h1>
				<p class="page-welcome-line">
					<span th:text="${welcomeName}">—</span><span class="page-welcome-sep"> · </span><span th:text="${welcomeDesignation}">—</span>
				</p>
			</div>
			<div class="header-meta">
				<span class="last-updated">Last refreshed: <span th:text="${#dates.format(new java.util.Date(), 'dd MMM yyyy, hh:mm a')}">—</span></span>
				<button type="button" class="btn-refresh" onclick="location.reload()">Refresh</button>
			</div>
		</div>
		<div class="welcome-banner">
			<div class="welcome-text">
				<h2 class="welcome-title">Welcome back, <span th:text="${welcomeName}">Officer</span></h2>
				<p class="welcome-sub"><span th:text="${welcomeDesignation}">Designation</span></p>
			</div>
			<div class="welcome-badge">
				<div class="badge-avatar" th:text="${welcomeInitials}">U</div>
				<div class="badge-info">
					<span class="badge-role" th:text="${welcomeRoleLabel}">Officer</span>
					<span class="badge-dept" th:text="${welcomeDesignation}">Designation</span>
				</div>
			</div>
		</div>
		<div class="stats-row">
			<div class="stat-card">
				<div class="stat-icon stat-blue"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
				<div class="stat-body"><span class="stat-label">Total Records</span><span class="stat-value">0</span><span class="stat-foot">In all collections</span></div>
			</div>
			<div class="stat-card">
				<div class="stat-icon stat-teal"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
				<div class="stat-body"><span class="stat-label">Total Officers</span><span class="stat-value">0</span><span class="stat-foot">Registered officers</span></div>
			</div>
			<div class="stat-card">
				<div class="stat-icon stat-green"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></div>
				<div class="stat-body"><span class="stat-label">My Documents</span><span class="stat-value">0</span><span class="stat-foot">Uploaded by you</span></div>
			</div>
			<div class="stat-card">
				<div class="stat-icon stat-amber"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
				<div class="stat-body"><span class="stat-label">Pending Approvals</span><span class="stat-value">0</span><span class="stat-foot">Awaiting your review</span></div>
			</div>
		</div>
	</div>
</section>
</body>
</html>
