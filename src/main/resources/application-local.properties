# Browser Origin when you open this app at http://localhost:8089 (same server as UI; no separate frontend port).
app.cors.allowed-origins=http://localhost:8089,http://127.0.0.1:8089

# ===============================
# DATABASE CONFIG (PostgreSQL) - LOCAL
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/dolr_inst
spring.datasource.username=postgres
spring.datasource.password=postgres

# ===============================
# JPA / HIBERNATE - LOCAL
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# JWT CONFIG - LOCAL
# ===============================
jwt.secret=your_super_secret_key_here_make_it_long
