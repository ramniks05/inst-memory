<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}" lang="en">
<body>
<section layout:fragment="content">
	<div class="documents-upload-container">
		<div class="page-header">
			<div class="page-header-left">
				<h1 class="page-title">Upload PDF</h1>
				<span class="page-subtitle">Published for selected designations</span>
			</div>
			<div class="header-actions" style="padding-right:1.75rem;">
				<a style="display:inline-flex;padding:0.45rem 0.9rem;background:#eef3fb;border:1px solid #c0ceea;border-radius:3px;color:#003d7a;font-weight:600;font-size:0.85rem;text-decoration:none;"
				   th:href="@{/home/documents}">Back to documents</a>
			</div>
		</div>
		<div style="padding: 1.25rem 1.75rem;">
			<div th:if="${uploadError}" style="margin-bottom:1rem;padding:0.75rem 1rem;border-radius:4px;font-size:0.9rem;background:#ffebee;color:#b71c1c;" th:text="${uploadError}"></div>
			<form th:action="@{/home/documents/new}" method="post" enctype="multipart/form-data" class="admin-form-grid" style="max-width:36rem;">
				<label>Title
					<input type="text" name="title" required maxlength="500" placeholder="Document title"/>
				</label>
				<label>Document type
					<select name="documentTypeId" required>
						<option th:each="t : ${documentTypes}" th:value="${t.id}" th:text="${t.name}"></option>
					</select>
				</label>
				<fieldset style="border:1px solid #c0ceea;border-radius:4px;padding:0.75rem;margin:0;">
					<legend style="font-weight:600;font-size:0.82rem;color:#334155;padding:0 0.35rem;">Visible to designations (at least one)</legend>
					<div th:if="${designations.isEmpty()}" style="color:#b71c1c;font-size:0.85rem;">No active designations. Contact an administrator.</div>
					<label th:each="des : ${designations}" style="flex-direction:row;align-items:center;gap:0.5rem;margin-top:0.35rem;">
						<input type="checkbox" name="designationIds" th:value="${des.id}"/>
						<span th:text="${des.name}">Name</span>
						<span th:if="${des.handlesAllDivisions}" style="font-size:0.75rem;color:#64748b;">(all divisions)</span>
					</label>
				</fieldset>
				<label>PDF file
					<input type="file" name="file" accept="application/pdf,.pdf" required/>
				</label>
				<button type="submit" style="display:inline-flex;align-items:center;padding:0.45rem 0.9rem;background:#003d7a;color:#fff;border:none;border-radius:3px;font-weight:600;font-size:0.85rem;cursor:pointer;font-family:inherit;">Upload</button>
			</form>
		</div>
	</div>
</section>
</body>
</html>
