<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="sidebar" th:fragment="sidebar" th:with="cp=${ctx}">
	<div class="sidebar-header">
		<div class="brand-mark">
			<div class="brand-emblem">DoLR</div>
		</div>
	</div>
	<nav class="sidebar-nav">
		<th:block th:if="${portalAdministrator}">
			<p class="sidebar-nav-heading">Administration</p>
			<div class="nav-item" th:classappend="${activeMenu == 'dashboard'} ? ' active'">
				<a th:href="${cp + '/home'}" class="nav-link" title="Dashboard">
					<span class="nav-icon">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
					</span>
					<span class="nav-label">Dashboard</span>
					<span class="active-pip" th:if="${activeMenu == 'dashboard'}"></span>
				</a>
			</div>
			<div class="nav-item" th:classappend="${activeMenu == 'admin-documents'} ? ' active'">
				<a th:href="${cp + '/admin/documents'}" class="nav-link" title="Documents">
					<span class="nav-icon">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
					</span>
					<span class="nav-label">Documents</span>
					<span class="active-pip" th:if="${activeMenu == 'admin-documents'}"></span>
				</a>
			</div>
			<div class="nav-item" th:classappend="${activeMenu == 'admin-officers' || activeMenu == 'admin-officer-new' || activeMenu == 'admin-officer-edit'} ? ' active'">
				<a th:href="${cp + '/admin/officers'}" class="nav-link" title="Officers">
					<span class="nav-icon">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
					</span>
					<span class="nav-label">Officers</span>
					<span class="active-pip" th:if="${activeMenu == 'admin-officers' || activeMenu == 'admin-officer-new' || activeMenu == 'admin-officer-edit'}"></span>
				</a>
			</div>
			<div class="nav-item" th:classappend="${activeMenu == 'admin-divisions'} ? ' active'">
				<a th:href="${cp + '/admin/divisions'}" class="nav-link" title="Divisions">
					<span class="nav-icon">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
					</span>
					<span class="nav-label">Divisions</span>
					<span class="active-pip" th:if="${activeMenu == 'admin-divisions'}"></span>
				</a>
			</div>
			<div class="nav-item" th:classappend="${activeMenu == 'admin-designations'} ? ' active'">
				<a th:href="${cp + '/admin/designations'}" class="nav-link" title="Designations">
					<span class="nav-icon">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
					</span>
					<span class="nav-label">Designations</span>
					<span class="active-pip" th:if="${activeMenu == 'admin-designations'}"></span>
				</a>
			</div>
			<div class="nav-item" th:classappend="${activeMenu == 'admin-document-types'} ? ' active'">
				<a th:href="${cp + '/admin/document-types'}" class="nav-link" title="Document types">
					<span class="nav-icon">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="16" y2="11"/></svg>
					</span>
					<span class="nav-label">Doc types</span>
					<span class="active-pip" th:if="${activeMenu == 'admin-document-types'}"></span>
				</a>
			</div>
			<p class="sidebar-nav-heading" style="margin-top:0.75rem;">Account</p>
			<div class="nav-item" th:classappend="${activeMenu == 'change-password'} ? ' active'">
				<a th:href="${cp + '/home/change-password'}" class="nav-link" title="Change Password">
					<span class="nav-icon">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
					</span>
					<span class="nav-label">Change Password</span>
					<span class="active-pip" th:if="${activeMenu == 'change-password'}"></span>
				</a>
			</div>
		</th:block>
		<th:block th:if="${!portalAdministrator && signedIn}">
			<p class="sidebar-nav-heading">Portal</p>
			<div class="nav-item" th:classappend="${activeMenu == 'documents'} ? ' active'">
				<a th:href="${cp + '/home/documents'}" class="nav-link" title="Documents">
					<span class="nav-icon">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
					</span>
					<span class="nav-label">Documents</span>
					<span class="active-pip" th:if="${activeMenu == 'documents'}"></span>
				</a>
			</div>
			<div class="nav-item" th:classappend="${activeMenu == 'my-uploads'} ? ' active'">
				<a th:href="${cp + '/home/my-uploads'}" class="nav-link" title="My Uploads">
					<span class="nav-icon">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
					</span>
					<span class="nav-label">My Uploads</span>
					<span class="active-pip" th:if="${activeMenu == 'my-uploads'}"></span>
				</a>
			</div>
			<div class="nav-item" th:classappend="${activeMenu == 'mpr'} ? ' active'">
				<a th:href="${cp + '/home/mpr'}" class="nav-link" title="MPR">
					<span class="nav-icon">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
					</span>
					<span class="nav-label">MPR</span>
					<span class="active-pip" th:if="${activeMenu == 'mpr'}"></span>
				</a>
			</div>
			<p class="sidebar-nav-heading" style="margin-top:0.75rem;">Account</p>
			<div class="nav-item" th:classappend="${activeMenu == 'change-password'} ? ' active'">
				<a th:href="${cp + '/home/change-password'}" class="nav-link" title="Change Password">
					<span class="nav-icon">
						<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
					</span>
					<span class="nav-label">Change Password</span>
					<span class="active-pip" th:if="${activeMenu == 'change-password'}"></span>
				</a>
			</div>
		</th:block>
	</nav>
	<div class="sidebar-user" th:if="${signedIn}">
		<div class="sidebar-user__avatar" th:text="${navUserInitials}">U</div>
		<div class="sidebar-user__info">
			<span class="sidebar-user__name" th:text="${navUserName}">Officer Name</span>
			<span class="sidebar-user__meta">
				<span class="sidebar-user__role" th:text="${navUserRole}">Officer</span>
				<span class="sidebar-user__sep" th:if="${navUserDesignation != null and navUserDesignation != '—'}"> · </span>
				<span class="sidebar-user__desig" th:if="${navUserDesignation != null and navUserDesignation != '—'}" th:text="${navUserDesignation}">Designation</span>
			</span>
		</div>
	</div>
</aside>
</body>
</html>
