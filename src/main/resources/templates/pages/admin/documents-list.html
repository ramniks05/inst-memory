<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin-main}" lang="en">
<body>
<section layout:fragment="content">
	<div class="dashboard-container documents-page documents-page--admin">
		<div class="page-header">
			<div class="page-header-left">
				<h1 class="page-title">Published documents</h1>
				<span class="page-subtitle">PDFs and visibility by designation (view only — officers upload from the portal)</span>
			</div>
		</div>

		<div class="documents-page__body">
			<div th:if="${filterInvalid}" class="admin-flash admin-flash--err">Enter a valid from and/or to date (YYYY-MM-DD).</div>

			<form th:action="@{/admin/documents}" method="get" class="doc-filter-form">
				<label class="doc-filter-form__label">From date
					<input type="date" name="dateFrom" th:value="${filterFrom}" class="doc-filter-form__input"/>
				</label>
				<label class="doc-filter-form__label">To date
					<input type="date" name="dateTo" th:value="${filterTo}" class="doc-filter-form__input"/>
				</label>
				<input type="hidden" name="page" value="0"/>
				<input type="hidden" name="size" th:value="${documentPage.size}"/>
				<button type="submit" class="admin-btn doc-filter-form__submit">Apply filter</button>
				<a class="admin-btn admin-btn--muted doc-filter-form__clear" th:href="@{/admin/documents}">Clear</a>
			</form>

			<div th:replace="~{fragments/documents-table :: documentsTable(${documentPage}, ${documentsShowDelete}, 'No documents match your filter.')}"></div>
			<div th:replace="~{fragments/documents-pagination :: documentsPagination(${documentPage}, ${documentsListPath}, ${filterFrom}, ${filterTo})}"></div>
		</div>
	</div>
</section>
</body>
</html>
