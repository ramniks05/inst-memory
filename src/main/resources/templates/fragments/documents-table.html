<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="documentsTable(documentPage, showDelete, emptyMessage, deletePath, showEdit, editBasePath)" class="doc-table-wrap">
	<div class="doc-table-toolbar" th:if="${documentPage.totalElements > 0}">
		<span class="doc-table-count"
		      th:text="|Showing ${documentPage.fromIndex}–${documentPage.toIndex} of ${documentPage.totalElements}|">
			Showing 1–10 of 42
		</span>
	</div>
	<div class="doc-table-scroll">
		<table class="doc-table">
			<thead>
			<tr>
				<th class="doc-table__th doc-table__th--sno">S.No.</th>
				<th class="doc-table__th doc-table__th--title">Title</th>
				<th class="doc-table__th">Type</th>
				<th class="doc-table__th">Uploaded by</th>
				<th class="doc-table__th doc-table__th--visibility">Visible to</th>
				<th class="doc-table__th doc-table__th--date">Uploaded</th>
				<th class="doc-table__th doc-table__th--actions"
				    th:colspan="${1 + (showDelete ? 1 : 0) + (showEdit ? 1 : 0)}">Actions</th>
			</tr>
			</thead>
			<tbody>
			<tr th:if="${documentPage.empty}">
				<td th:colspan="${7 + (showDelete ? 1 : 0) + (showEdit ? 1 : 0)}" class="doc-table__empty">
					<span class="doc-table__empty-icon" aria-hidden="true">📄</span>
					<span th:text="${emptyMessage}">No documents yet.</span>
				</td>
			</tr>
			<tr th:each="row, iterStat : ${documentPage.content}" class="doc-table__row">
				<td class="doc-table__td doc-table__td--sno"
				    th:text="${documentPage.page * documentPage.size + iterStat.count}">1</td>
				<td class="doc-table__td doc-table__td--title" th:text="${row.title}">—</td>
				<td class="doc-table__td">
					<span class="doc-badge" th:text="${row.documentTypeName}">—</span>
				</td>
				<td class="doc-table__td" th:text="${row.uploadedByName}">—</td>
				<td class="doc-table__td doc-table__td--visibility" th:text="${row.visibleToDesignationsSummary}">—</td>
				<td class="doc-table__td doc-table__td--date" th:text="${#temporals.format(row.uploadDate, 'dd MMM yyyy, HH:mm')}">—</td>
				<td class="doc-table__td doc-table__td--actions">
					<a class="doc-btn doc-btn--view"
					   th:href="@{/documents/file/{id}(id=${row.id})}"
					   target="_blank" rel="noopener">
						View PDF
					</a>
				</td>
				<td class="doc-table__td doc-table__td--actions" th:if="${showEdit}">
					<a class="doc-btn doc-btn--edit"
					   th:href="${editBasePath + '/' + row.id + '/edit'}">
						Edit
					</a>
				</td>
				<td class="doc-table__td doc-table__td--actions" th:if="${showDelete}">
					<form th:action="${deletePath}" method="post" class="doc-delete-form">
						<input type="hidden" name="id" th:value="${row.id}"/>
						<button type="submit" class="doc-btn doc-btn--danger"
						        onclick="return confirm('Delete this document permanently?');">
							Delete
						</button>
					</form>
				</td>
			</tr>
			</tbody>
		</table>
	</div>
</div>
</body>
</html>
