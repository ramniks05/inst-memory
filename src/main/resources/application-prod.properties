# Must match browser Origin (scheme+host only). Context path /institutionalmemory is NOT part of Origin.
# Must match any browser Origin used in front of this app (apex + www if both exist).
app.cors.allowed-origins=https://dilrmp.gov.in,https://www.dilrmp.gov.in

# ===============================
# FILE UPLOADS (same JVM as this app)
# ===============================
# Writable path on the server (override with env for a fixed disk mount).
app.documents.upload-dir=${APP_DOCUMENTS_UPLOAD_DIR:uploads/documents}
# If you use nginx / Apache / a reverse proxy in front of this app, raise its body limit too, e.g.:
#   nginx: client_max_body_size 40m;
#   Apache: LimitRequestBody 41943040

# ===============================
# FLYWAY (schema migrations for prod)
# ===============================
# Base application.properties has spring.flyway.enabled=false for local convenience.
# Prod uses ddl-auto=validate — the DB must match JPA; Flyway applies db/migration/*.sql on startup.
# If this database already had tables but never had Flyway, baseline-on-migrate creates flyway_schema_history
# and runs only migrations above the baseline version (default 1 skips V1 if already applied manually).
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# Back up the database before the first Flyway run if you have existing data; V4 once dropped legacy documents.

# ===============================
# REVERSE PROXY / SESSION (required for menu navigation behind nginx)
# ===============================
# Browser URL: https://dilrmp.gov.in/institutionalmemory/...
# nginx must proxy_pass with the SAME path (see comment at bottom).
app.portal.public-path-prefix=/institutionalmemory
server.forward-headers-strategy=framework
server.servlet.session.cookie.path=/
server.servlet.session.tracking-modes=cookie
server.tomcat.use-relative-redirects=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
# HTTPS site — cookie must be Secure or some browsers drop it on the next click.
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:true}

# ===============================
# DATABASE CONFIG (PostgreSQL) - PROD
# ===============================
spring.datasource.url=jdbc:postgresql://10.247.203.123:5432/dolr_inst
spring.datasource.username=postgres
spring.datasource.password=Postgres@123

# ===============================
# JPA / HIBERNATE - PROD
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# JWT CONFIG - PROD
# ===============================
# Set JWT_SECRET in the environment for production (min 32 characters for HS256).
# Default below allows startup when the variable is unset; change it before go-live.
jwt.secret=${JWT_SECRET:dolrSuperSecretKeyDolrSuperSecretKey123456}

# Default admin on first start if no ADMIN exists. Set BOOTSTRAP_ADMIN_PASSWORD in the environment; then disable.
app.bootstrap-admin.enabled=true
app.bootstrap-admin.email=admin@dolr.gov.in
app.bootstrap-admin.password=${BOOTSTRAP_ADMIN_PASSWORD:Admin@123}
app.bootstrap-admin.full-name=admin

