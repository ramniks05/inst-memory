spring.application.name=dolr-backend

# HTTP server
server.port=8089
server.servlet.context-path=/institutionalmemory
# Public URL prefix for menu links when nginx exposes /institutionalmemory but strips it before the JVM.
app.portal.public-path-prefix=/institutionalmemory
# Session cookie: path / so JSESSIONID is sent for all app URLs; PORTAL_UID restores session if it is still missing.
server.servlet.session.cookie.path=/
server.servlet.session.tracking-modes=cookie
# Relative redirects stay on the same host/path (important behind nginx).
server.tomcat.use-relative-redirects=true

# Default profile
spring.profiles.active=local

# ===============================
# SWAGGER / OPENAPI
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Thymeleaf (server-rendered UI). Cache off in local dev.
spring.thymeleaf.cache=false

# ===============================
# FLYWAY — disabled for default/local (JPA update on local DB is enough).
# Production enables Flyway in application-prod.properties so validate mode matches real tables.
# ===============================
spring.flyway.enabled=false

# Browser CORS: comma-separated origins (scheme + host [+ port], no path). If the browser sends
# an Origin header and it is not listed here, Spring returns 403 (often mistaken for auth/CSRF).
# Example: app URL https://dilrmp.gov.in/institutionalmemory/  ->  Origin is still https://dilrmp.gov.in (never include /institutionalmemory here).
# Monolith (Thymeleaf + API on this app): no separate SPA port; prod hosts below. Local dev overrides in application-local.properties.
app.cors.allowed-origins=https://dilrmp.gov.in,https://www.dilrmp.gov.in

# Session token signing (min ~32 chars for HS256). Prod overrides via JWT_SECRET.
jwt.secret=dolrSuperSecretKeyDolrSuperSecretKey123456

# Thymeleaf portal only — do not generate a default Spring Security user in logs.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# First-time default ADMIN (skipped if any user with role ADMIN already exists). Override in prod.
app.bootstrap-admin.enabled=true
app.bootstrap-admin.email=admin@dolr.gov.in
app.bootstrap-admin.password=Admin@123
app.bootstrap-admin.full-name=admin

# PDF uploads (officer uploads). Relative paths resolve against the process working directory;
# in production set APP_DOCUMENTS_UPLOAD_DIR to an absolute path on a writable disk/volume.
app.documents.upload-dir=uploads/documents

# Multipart (PDF upload form). max-request-size must be slightly larger than max-file-size (form fields + file).
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=35MB
# Parse file parts to disk above this threshold to reduce in-memory buffering during upload.
spring.servlet.multipart.file-size-threshold=2MB
# Embedded Tomcat defaults max POST body to 2MB unless raised — large uploads fail with 413 / broken multipart
# unless this is at least as large as max-request-size (add headroom for boundary overhead).
server.tomcat.max-http-form-post-size=40MB
# If the server aborts a large upload, consume the remainder of the body so the connection closes cleanly.
server.tomcat.max-swallow-size=40MB