<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title th:text="${pageTitle}">Institutional Memory Portal</title>
	<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="landing-page landing-page--modern">
	<header th:replace="~{fragments/header :: header (showLogin=${headerShowLogin}, headerVariant='site')}"></header>

	<th:block th:replace="~{fragments/landing-public-top :: publicTop}"></th:block>

	<main class="landing-main">
		<div class="landing-strip">
			<article class="landing-pill">
				<div class="landing-pill__icon" aria-hidden="true">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
				</div>
				<h2 class="landing-pill__title">Secure repository</h2>
				<p class="landing-pill__text">Government-grade access for authorised users only.</p>
			</article>
			<article class="landing-pill">
				<div class="landing-pill__icon" aria-hidden="true">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
				</div>
				<h2 class="landing-pill__title">Officer registry</h2>
				<p class="landing-pill__text">Profiles managed by portal administrators.</p>
			</article>
		</div>

		<p class="landing-footnote">
			Ministry of Rural Development, Government of India — institutional knowledge for the Department of Land Resources.
		</p>
	</main>

	<footer th:replace="~{fragments/footer :: footer}"></footer>
</div>
<script th:replace="~{fragments/landing-public-top :: carouselScript}"></script>
</body>
</html>
