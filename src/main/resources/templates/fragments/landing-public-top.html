<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="publicTop">
	<section class="landing-hero" aria-label="Portal introduction">
		<div class="landing-hero__bg" role="presentation">
			<img class="landing-hero__img" th:src="@{/images/landing-hero.png}" alt="" loading="eager"/>
			<div class="landing-hero__shade"></div>
		</div>
		<div class="landing-hero__inner">
			<div class="landing-hero__copy">
				<p class="landing-hero__eyebrow">Department of Land Resources</p>
				<h1 class="landing-hero__title">Institutional Memory Portal</h1>
				<p class="landing-hero__lead">Secure access to departmental records for officers and administrators.</p>
				<a class="landing-hero__cta landing-hero__cta--primary" th:href="@{/login}">Sign in to portal</a>
			</div>
			<div class="landing-hero__visual" aria-hidden="true">
				<div class="icon-rotator">
					<div class="icon-rotator__ring"></div>
					<div class="icon-rotator__slides">
						<div class="icon-rotator__slide icon-rotator__slide--active" data-icon="0">
							<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><path d="M28 6H12a4 4 0 0 0-4 4v28a4 4 0 0 0 4 4h24a4 4 0 0 0 4-4V18L28 6z"/><path d="M28 6v12h12"/><path d="M16 26h16M16 32h12"/></svg>
							<span>Documents</span>
						</div>
						<div class="icon-rotator__slide" data-icon="1">
							<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><rect x="10" y="22" width="28" height="18" rx="2"/><path d="M16 22V16a8 8 0 0 1 16 0v6"/></svg>
							<span>Secure access</span>
						</div>
						<div class="icon-rotator__slide" data-icon="2">
							<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 36h32"/><path d="M14 36V20l10-8 10 8v16"/><path d="M20 28h8v8h-8z"/></svg>
							<span>Archive</span>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>
</th:block>

<script th:fragment="carouselScript">
(function () {
	var slides = document.querySelectorAll('.icon-rotator__slide');
	if (!slides.length) return;
	var i = 0;
	function show(n) {
		i = (n + slides.length) % slides.length;
		slides.forEach(function (s, idx) {
			s.classList.toggle('icon-rotator__slide--active', idx === i);
		});
	}
	setInterval(function () { show(i + 1); }, 3200);
})();
</script>
</body>
</html>
