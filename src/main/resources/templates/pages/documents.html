<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}" lang="en">
<body>
<section layout:fragment="content">
	<div class="documents-upload-container documents-page">
		<div class="page-header">
			<div class="page-header-left">
				<h1 class="page-title">Documents</h1>
				<span class="page-subtitle">PDFs published for your designation</span>
			</div>
			<div class="header-actions" th:if="${!portalAdministrator}">
				<a class="doc-upload-btn" th:href="@{/home/documents/new}">Upload PDF</a>
			</div>
		</div>

		<div class="documents-page__body">
			<div th:if="${uploadSuccess}" class="doc-flash doc-flash--ok" th:text="${uploadSuccess}"></div>
			<div th:if="${noDesignation}" class="doc-flash doc-flash--warn">
				Your profile has no designation assigned. Ask an administrator to set your designation so you can see documents targeted to your level.
			</div>

			<div th:replace="~{fragments/documents-table :: documentsTable(${documentPage}, ${documentsShowDelete}, 'No documents are available for your designation yet.')}"></div>
			<div th:replace="~{fragments/documents-pagination :: documentsPagination(${documentPage}, ${documentsListPath}, '', '')}"></div>
		</div>
	</div>
</section>
</body>
</html>
