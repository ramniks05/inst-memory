<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}" lang="en">
<body>
<section layout:fragment="content">
	<div class="documents-upload-container">
		<div class="page-header">
			<div class="page-header-left">
				<h1 class="page-title">Edit Document</h1>
				<span class="page-subtitle" th:text="${doc.title}">Document title</span>
			</div>
			<div class="header-actions" style="padding-right:1.75rem;">
				<a class="admin-btn admin-btn--muted" th:href="@{/home/my-uploads}" style="text-decoration:none;">Back to My Uploads</a>
			</div>
		</div>
		<div class="form-page-body">
			<div class="admin-flash admin-flash--err" th:if="${editError}" th:text="${editError}"></div>
			<form th:action="@{/home/my-uploads/{id}/edit(id=${doc.id})}" method="post" class="admin-form-grid">
				<label>Title
					<input type="text" name="title" th:value="${doc.title}" required maxlength="500"/>
				</label>
				<label>Document type
					<select name="documentTypeId" required>
						<option th:each="t : ${documentTypes}"
						        th:value="${t.id}"
						        th:text="${t.name}"
						        th:selected="${t.id == doc.documentType.id}"></option>
					</select>
				</label>
				<fieldset style="border:1px solid #c0ceea;border-radius:4px;padding:0.75rem;margin:0;">
					<legend style="font-weight:600;font-size:0.82rem;color:#334155;padding:0 0.35rem;">Visible to designations (at least one)</legend>
					<div th:if="${designations.isEmpty()}" style="color:#b71c1c;font-size:0.85rem;">No active designations available.</div>
					<label th:each="des : ${designations}" style="flex-direction:row;align-items:center;gap:0.5rem;margin-top:0.35rem;">
						<input type="checkbox" name="designationIds" th:value="${des.id}"
						       th:checked="${selectedDesignationIds.contains(des.id)}"/>
						<span th:text="${des.name}">Name</span>
						<span th:if="${des.handlesAllDivisions}" style="font-size:0.75rem;color:#64748b;">(all divisions)</span>
					</label>
				</fieldset>
				<button type="submit" class="admin-btn">Save changes</button>
			</form>
		</div>
	</div>
</section>
</body>
</html>
